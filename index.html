<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eli AI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { height: 100vh; display: flex; background: #0a0a0a; overflow: hidden; }

    /* VERDE = 35% CHAT - igual tua foto */
    .chat {
        width: 35%;
        background: #0a3d0a; /* VERDE ESCURO IGUAL FOTO */
        display: flex;
        flex-direction: column;
    }
    .chat-header { padding: 15px; background: #062806; font-weight: bold; color: #00ff88; }
    .messages { flex: 1; padding: 15px; overflow-y: auto; }
    .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; }
    .msg-eli { background: #0f5f0f; color: white; }
    .msg-user { background: #1a1a1a; color: #00ff88; text-align: right; }
    .chat-input {
        display: flex;
        padding: 10px;
        background: #062806;
        border-top: 1px solid #00ff88;
    }
    .chat-input input {
        flex: 1;
        padding: 12px;
        background: #111;
        border: 1px solid #00ff88;
        color: white;
        border-radius: 5px;
    }
    .chat-input button {
        margin-left: 8px;
        padding: 12px 20px;
        background: #00ff88;
        color: black;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    }

    /* DIREITA = 65% */
    .direita { width: 65%; display: flex; flex-direction: column; }

    /* AZUL = 70% EDITOR */
    .editor {
        height: 70%;
        background: #0a0f2e; /* AZUL ESCURO IGUAL FOTO */
        display: flex;
        flex-direction: column;
    }
    .editor-header {
        height: 45px;
        background: #050a1f;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        border-bottom: 1px solid #1e3a8a;
        color: #60a5fa;
    }
    .editor-header button {
        background: #f59e0b;
        color: black;
        border: none;
        padding: 8px 18px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    }
    .editor textarea {
        flex: 1;
        background: #0a0f2e;
        color: #93c5fd;
        border: none;
        padding: 15px;
        font-family: 'Consolas', monospace;
        font-size: 14px;
        resize: none;
        outline: none;
    }

    /* AMARELO = 30% CONSOLE */
    .console {
        height: 30%;
        background: #3d3d00; /* AMARELO ESCURO IGUAL FOTO */
        display: flex;
        flex-direction: column;
    }
    .console-header {
        height: 35px;
        background: #2e2e00;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        color: yellow;
        font-weight: bold;
        border-bottom: 1px solid yellow;
    }
    .console-header button {
        background: yellow;
        color: black;
        border: none;
        padding: 5px 12px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
    }
    .console-body {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        color: #ffff99;
        font-family: 'Consolas', monospace;
        font-size: 13px;
    }
</style>
</head>
<body>

    <!-- 35% VERDE: CHAT -->
    <div class="chat">
        <div class="chat-header">ELI AI</div>
        <div class="messages" id="messages">
            <div class="msg msg-eli">Fala wy! Me pede código 🚀</div>
        </div>
        <div class="chat-input">
            <input type="text" id="pergunta" placeholder="Digite pra Eli..." onkeypress="if(event.key==='Enter')enviar()">
            <button onclick="enviar()">Enviar</button> <!-- AGORA TEM BOTÃO -->
        </div>
    </div>

    <!-- 65% DIREITA -->
    <div class="direita">
        <!-- 70% AZUL: EDITOR -->
        <div class="editor">
            <div class="editor-header">
                <span>main.js</span>
                <span></span>
            </div>
            <textarea id="editor">// Código do Eli aparece aqui</textarea>
        </div>

        <!-- 30% AMARELO: CONSOLE -->
        <div class="console">
            <div class="console-header">
                <span>CONSOLE</span>
                <button onclick="executar()">RUN ▶️</button> <!-- BOTÃO RUN NO CONSOLE -->
            </div>
            <div class="console-body" id="console-log">
> Conectado ao backend...<br>
> Aguardando comandos...
            </div>
        </div>
    </div>

<script>
let ultimoCodigo = "";

async function enviar() {
    let input = document.getElementById('pergunta');
    let pergunta = input.value;
    if(!pergunta) return;
    
    document.getElementById('messages').innerHTML += `<div class="msg msg-user">${pergunta}</div>`;
    input.value = "";

    // Exemplo: Eli responde com código
    ultimoCodigo = `function soma(a, b) {\n  return a + b;\n}\nconsole.log(soma(5, 3));`;
    document.getElementById('messages').innerHTML += `
        <div class="msg msg-eli">
            Pronto! Código criado 👇<br>
            <button onclick="enviarProEditor()" style="margin-top:8px; padding:6px 12px; background:#f59e0b; border:none; border-radius:4px; cursor:pointer;">REPLIT ▶️</button>
        </div>`;
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function enviarProEditor() {
    document.getElementById('editor').value = ultimoCodigo;
    logConsole("> Código enviado para o editor");
}

function executar() {
    let codigo = document.getElementById('editor').value;
    try {
        let resultado = eval(codigo);
        logConsole("> Resultado: " + resultado);
    } catch(e) {
        logConsole("> Erro: " + e.message);
    }
}

function logConsole(texto) {
    document.getElementById('console-log').innerHTML += `<br>${texto}`;
    document.getElementById('console-log').scrollTop = document.getElementById('console-log').scrollHeight;
}
</script>
</body>
</html>
