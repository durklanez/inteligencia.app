<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Eli AI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: white; font-family: Arial; display: flex; height: 100vh; }
    
    /* VERDE = CHAT */
    .chat { 
        width: 40%; 
        background: #0d4d0d; /* VERDE */
        display: flex; flex-direction: column; 
        border-right: 2px solid #333;
    }
    .messages { flex: 1; overflow-y: auto; padding: 10px; }
    .msg-eli { background: #1a6b1a; padding: 10px; border-radius: 8px; margin: 5px 0; }
    .msg-user { background: #333; padding: 10px; border-radius: 8px; margin: 5px 0; text-align: right; }
    .chat-input { display: flex; padding: 10px; background: #0a3a0a; }
    .chat-input input { flex: 1; padding: 10px; border: none; background: #222; color: white; }
    .chat-input button { padding: 10px 20px; background: #00ff00; color: black; border: none; cursor: pointer; }

    /* DIREITA = EDITOR + CONSOLE */
    .direita { width: 60%; display: flex; flex-direction: column; }

    /* AZUL = EDITOR */
    .editor { 
        flex: 2; 
        background: #001a4d; /* AZUL */
        display: flex; flex-direction: column;
    }
    .editor-header { padding: 10px; background: #000f33; display: flex; justify-content: space-between; }
    .editor-header button { background: #ff7700; color: white; border: none; padding: 8px 15px; cursor: pointer; }
    .editor textarea { flex: 1; background: #000d26; color: #00ff00; border: none; padding: 10px; font-family: 'Courier'; font-size: 14px; }

    /* AMARELO = CONSOLE */
    .console { 
        flex: 1; 
        background: #4d4d00; /* AMARELO ESCURO */
        padding: 10px; overflow-y: auto;
    }
    .console-title { color: yellow; font-weight: bold; margin-bottom: 5px; }
</style>
</head>
<body>

    <!-- VERDE: CHAT -->
    <div class="chat">
        <div class="messages" id="messages">
            <div class="msg-eli">Olá wy! Sou o Eli 🚀<br>Me pede pra criar código. Ex: "cria uma função de soma"</div>
        </div>
        <div class="chat-input">
            <input type="text" id="pergunta" placeholder="Digite pra Eli...">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <!-- DIREITA -->
    <div class="direita">
        <!-- AZUL: EDITOR -->
        <div class="editor">
            <div class="editor-header">
                <span>editor.js</span>
                <button onclick="executar()">▶️ RUN</button> <!-- BOTÃO RUN -->
            </div>
            <textarea id="editor">// O código do Eli vai aparecer aqui</textarea>
        </div>

        <!-- AMARELO: CONSOLE -->
        <div class="console">
            <div class="console-title">CONSOLE</div>
            <div id="console-log">> Conectado ao backend...<br>> Aguardando comandos...</div>
        </div>
    </div>

<script>
    let ultimoCodigo = ""; // Guarda o último código do Eli

    async function enviar() {
        let pergunta = document.getElementById('pergunta').value;
        if(!pergunta) return;
        
        document.getElementById('messages').innerHTML += `<div class="msg-user">${pergunta}</div>`;
        document.getElementById('pergunta').value = "";

        // Manda pro backend
        let res = await fetch('/teste-firestore', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({pergunta: pergunta})
        });
        let data = await res.json();
        
        // SIMULA RESPOSTA DO ELI COM CÓDIGO
        ultimoCodigo = `function soma(a, b) {\n  return a + b;\n}\n\nconsole.log(soma(5, 3));`;
        document.getElementById('messages').innerHTML += `
            <div class="msg-eli">
                Pronto wy! Criei o código pra ti 👇
                <button onclick="enviarProEditor()" style="background:orange; margin-top:5px; padding:5px;">REPLIT ▶️</button>
            </div>`; // BOTÃO REPLIT
    }

    // BOTÃO REPLIT: MANDA PRO EDITOR
    function enviarProEditor() {
        document.getElementById('editor').value = ultimoCodigo;
        logConsole("> Código enviado para o editor!");
    }

    // BOTÃO RUN: EXECUTA O CÓDIGO
    function executar() {
        let codigo = document.getElementById('editor').value;
        try {
            let resultado = eval(codigo); // CUIDADO: só pra teste
            logConsole("> Resultado: " + resultado);
        } catch(e) {
            logConsole("> Erro: " + e.message);
        }
    }

    function logConsole(texto) {
        document.getElementById('console-log').innerHTML += `<br>${texto}`;
    }
</script>

</body>
</html>
