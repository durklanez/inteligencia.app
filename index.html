<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;overflow:hidden}
.chat{height:45vh;background:#0a3d0a;display:flex;flex-direction:column}
.header{padding:10px;background:#062806;color:#0f0;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.msgs{flex:1;overflow-y:auto;padding:10px}
.msg{padding:10px;border-radius:8px;margin:5px 0;max-width:85%}
.user{background:#1a1a1a;color:#0f0;margin-left:auto}
.eli{background:#0f5f0f;color:#fff}
.input{display:flex;padding:10px;background:#062806;gap:5px;border-top:2px solid #0f0}
.input input{flex:1;padding:12px;background:#111;border:1px solid #0f0;color:#fff;border-radius:8px}
.input button{padding:12px;background:#0f0;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.btn2{background:#fa0!important}

/* EDITOR PRESO NA BARRA PRETA */
.editor{height:27.5vh;background:#0a0f2e;border-top:2px solid #60a5fa}
.ehead{padding:8px;background:#050a1f;color:#60a5fa;display:flex;gap:5px;align-items:center;border-bottom:1px solid #60a5fa}
.ehead button{background:#0a0f2e;color:#60a5fa;border:1px solid #60a5fa;padding:5px 10px;border-radius:5px;cursor:pointer}
.ehead button:disabled{opacity:0.3;cursor:not-allowed}
.ehead.fileName{flex:1;text-align:center;font-weight:bold}
.editor textarea{width:100%;height:calc(100% - 45px);background:#0a0f2e;color:#93c5fd;border:none;padding:10px;resize:none;outline:none;font-size:13px}

.console{height:20vh;background:#3d3d00}
.chead{padding:8px;background:#2e2e00;color:yellow;display:flex;justify-content:space-between}
.cbody{padding:10px;color:#ff9;font-size:12px;height:calc(100% - 40px);overflow-y:auto}

#menuBox{display:none;position:fixed;bottom:70px;left:10px;background:#111;border:2px solid #0f0;padding:10px;border-radius:10px;width:220px;z-index:999}
#menuBox div{padding:8px;cursor:pointer;border-radius:5px;border-bottom:1px solid #222}
#menuBox div:hover{background:#0f0;color:#000}
#menuBox.lang{color:#60a5fa}
.aviso{color:#fa0;font-weight:bold;margin-top:8px;font-size:13px}
</style></head><body>

<div class="chat"><div class="header"><span>ELI AI</span><button class="btn2" onclick="toggleMenu()">⋮</button></div>
<div class="msgs" id="msgs"><div class="msg eli">Fala wy! Sou a Eli. Me pede código 🚀</div></div>
<div class="input"><input id="perg" placeholder="Digite..." onkeypress="if(event.key==='Enter')enviar()"><button class="btn2" onclick="enviarFoto()">📷</button><button onclick="enviar()">Enviar</button></div></div>

<div class="editor" id="editorBox">
  <div class="ehead">
    <button id="btnPrev" onclick="prevFile()">◀</button>
    <span class="fileName" id="fileName">main.js</span>
    <button id="btnNext" onclick="nextFile()">▶</button>
  </div>
  <textarea id="editor" oninput="salvarCodigo()">// Código aparece aqui</textarea>
</div>

<div class="console"><div class="chead"><span>CONSOLE</span><div><button class="btn2" onclick="enviarErro()">🐛</button><button onclick="run()">RUN</button></div></div><div class="cbody" id="log">> Conectado...<br>> Aguardando...</div></div>

<div id="menuBox">
  <div onclick="addLang('html')" class="lang">🌐 Adicionar HTML</div>
  <div onclick="addLang('css')" class="lang">🎨 Adicionar CSS</div>
  <div onclick="addLang('py')" class="lang">🐍 Adicionar Python</div>
  <hr>
  <div onclick="alert('Settings em breve wy')">⚙️ Settings</div>
  <div onclick="alert('Projeto em breve wy')">📁 Projeto</div>
  <hr><div onclick="limpar()">🧹 Limpar Console</div>
</div>

<script>
let arquivos = {js:'// Código aparece aqui'};
let ordemArquivos = ['js'];
let arquivoAtual = 0;
let ultimoCod="", ultimoTipo="js";
let historico = [];

function salvarCodigo(){
  let lang = ordemArquivos[arquivoAtual];
  arquivos = document.getElementById('editor').value; // SALVA SEMPRE
}

function addLang(lang){
  if(arquivos){
    alert('Essa linguagem já foi adicionada wy');
    return;
  }
  arquivos='';
  ordemArquivos.push(lang);
  arquivoAtual = ordemArquivos.length-1;
  atualizarEditor();
  atualizarBotoes();
  toggleMenu();
}

function prevFile(){
  salvarCodigo();
  if(arquivoAtual > 0) arquivoAtual--;
  atualizarEditor();
  atualizarBotoes();
}
function nextFile(){
  salvarCodigo();
  if(arquivoAtual < ordemArquivos.length-1) arquivoAtual++;
  atualizarEditor();
  atualizarBotoes();
}

function atualizarEditor(){
  let lang = ordemArquivos[arquivoAtual];
  document.getElementById('fileName').innerText = 'main.'+lang;
  document.getElementById('editor').value = arquivos || '';
}

function atualizarBotoes(){
  document.getElementById('btnPrev').disabled = arquivoAtual == 0;
  document.getElementById('btnNext').disabled = arquivoAtual == ordemArquivos.length-1;
}

async function enviar(){
  let p = document.getElementById('perg');
  if(!p.value) return;
  let pergunta = p.value;
  addMsg(pergunta,'user');
  historico.push({role:"user",content:pergunta});
  p.value="";
  let loadingId = addMsg("Eli pensando...","eli");
  try{
    let res = await fetch("/teste-firestore",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pergunta, historico})});
    let data = await res.json();
    document.getElementById(loadingId).remove();
    historico.push({role:"assistant",content:data.resposta});
    
    let html = `<div class="msg eli">${data.resposta}`;
    
    // ELI SÓ AVISA
    if(data.tipo &&!arquivos[data.tipo]){
      html+=`<div class="aviso">⚠️ Wy, tá faltando a aba ${data.tipo.toUpperCase()}<br>Vai no menu ⋮ e clica em "Adicionar ${data.tipo.toUpperCase()}"</div>`;
    }
    
    if(data.codigo){
      ultimoCod=data.codigo; ultimoTipo=data.tipo;
      arquivos[data.tipo] = data.codigo;
      let langAtual = ordemArquivos[arquivoAtual];
      if(langAtual == data.tipo) document.getElementById('editor').value = data.codigo;
      html+=`<br><button class="btn2" onclick="enviarEditor()">📤 Enviar pro Editor</button>`;
    }
    html+="</div>";
    document.getElementById('msgs').innerHTML+=html;
  }catch(e){document.getElementById(loadingId).remove(); addMsg("Erro: "+e.message,"eli");}
}

function addMsg(t,tipo){let id='m'+Date.now();document.getElementById('msgs').innerHTML+=`<div class="msg ${tipo}" id="${id}">${t}</div>`;document.getElementById('msgs').scrollTop=9999;return id;}
function enviarFoto(){addMsg("📷 Foto","user");addMsg("Manda a foto wy","eli")}
function enviarEditor(){
  salvarCodigo();
  let lang = ordemArquivos[arquivoAtual];
  arquivos=ultimoCod;
  if(ordemArquivos.indexOf(ultimoTipo) == -1){
    alert('⚠️ Primeiro adiciona a aba '+ultimoTipo+' no menu');
    return;
  }
  arquivoAtual = ordemArquivos.indexOf(ultimoTipo);
  atualizarEditor();
  atualizarBotoes();
  addMsg("Código no editor","eli")
}
function toggleMenu(){let m=document.getElementById('menuBox');m.style.display=m.style.display=='block'?'none':'block'}
function limpar(){document.getElementById('log').innerHTML='> Limpo'}
function run(){
  salvarCodigo();
  let c=document.getElementById('editor').value; 
  let lang = ordemArquivos[arquivoAtual];
  if(lang=='js'){try{let r=new Function(c)(); log('> Resultado: '+r)}catch(e){log('> Erro: '+e.message)}}
  else if(lang=='html'){let w=window.open(); w.document.write(c); log('> HTML aberto em aba nova')}
  else{log('> '+lang+' só roda no servidor')}
}
function log(t){document.getElementById('log').innerHTML+=`<br>${t}`}
function enviarErro(){let e=document.getElementById('log').innerText;document.getElementById('perg').value='Eli me ajuda: '+e;enviar()}
atualizarBotoes();
</script></body></html>
