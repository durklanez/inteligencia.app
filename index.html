<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eli AI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { height: 100vh; display: flex; background: #0a0a0a; overflow: hidden; }

    /* VERDE = 30% CHAT DIVIDIDO NO MEIO */
    .chat {
        width: 30%;
        background: #0a3d0a;
        display: flex;
        flex-direction: column;
    }
    .chat-header { padding: 15px; background: #062806; font-weight: bold; color: #00ff88; font-size: 18px; }
    .messages { 
        flex: 1; 
        padding: 15px; 
        overflow-y: auto; 
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .msg { padding: 12px; border-radius: 10px; max-width: 90%; }
    .msg-eli { background: #0f5f0f; color: white; align-self: flex-start; }
    .msg-user { background: #1a1a1a; color: #00ff88; align-self: flex-end; }
    
    .chat-input {
        padding: 10px;
        background: #062806;
        border-top: 2px solid #00ff88;
        display: flex;
        gap: 8px;
    }
    .chat-input input {
        flex: 1;
        padding: 12px;
        background: #111;
        border: 1px solid #00ff88;
        color: white;
        border-radius: 5px;
    }
    .chat-input button {
        padding: 12px 15px;
        background: #00ff88;
        color: black;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    }
    .btn-foto {
        background: #ffaa00 !important;
    }

    /* DIREITA = 70% */
    .direita { width: 70%; display: flex; flex-direction: column; }

    /* AZUL = 50% EDITOR */
    .editor {
        height: 50%; /* MESMA ALTURA DO CONSOLE */
        background: #0a0f2e;
        display: flex;
        flex-direction: column;
    }
    .editor-header {
        height: 45px;
        background: #050a1f;
        display: flex;
        align-items: center;
        padding: 0 15px;
        border-bottom: 1px solid #1e3a8a;
        color: #60a5fa;
        font-weight: bold;
    }
    .editor textarea {
        flex: 1;
        background: #0a0f2e;
        color: #93c5fd;
        border: none;
        padding: 15px;
        font-family: 'Consolas', monospace;
        font-size: 14px;
        resize: none;
        outline: none;
    }

    /* AMARELO = 50% CONSOLE */
    .console {
        height: 50%; /* MESMA ALTURA DO EDITOR */
        background: #3d3d00;
        display: flex;
        flex-direction: column;
    }
    .console-header {
        height: 45px;
        background: #2e2e00;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        color: yellow;
        font-weight: bold;
        border-bottom: 2px solid yellow;
    }
    .console-header button {
        background: yellow;
        color: black;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
    }
    .console-body {
        flex: 1;
        padding: 10px 15px;
        overflow-y: auto;
        color: #ffff99;
        font-family: 'Consolas', monospace;
        font-size: 13px;
    }
</style>
</head>
<body>

    <!-- 30% VERDE: CHAT -->
    <div class="chat">
        <div class="chat-header">ELI AI</div>
        <div class="messages" id="messages">
            <div class="msg msg-eli">Fala wy! Me pede código 🚀</div>
        </div>
        <div class="chat-input">
            <input type="text" id="pergunta" placeholder="Digite pra Eli..." onkeypress="if(event.key==='Enter')enviar()">
            <button class="btn-foto" onclick="enviarFoto()">📷</button> <!-- BOTÃO FOTO -->
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <!-- 70% DIREITA -->
    <div class="direita">
        <!-- 50% AZUL: EDITOR -->
        <div class="editor">
            <div class="editor-header">main.js</div>
            <textarea id="editor">// Código do Eli aparece aqui</textarea>
        </div>

        <!-- 50% AMARELO: CONSOLE -->
        <div class="console">
            <div class="console-header">
                <span>CONSOLE</span>
                <button onclick="executar()">RUN ▶️</button>
            </div>
            <div class="console-body" id="console-log">
> Conectado ao backend...<br>
> Aguardando comandos...
            </div>
        </div>
    </div>

<script>
let ultimoCodigo = "";

async function enviar() {
    let input = document.getElementById('pergunta');
    let pergunta = input.value;
    if(!pergunta) return;
    
    addMsg(pergunta, 'user');
    input.value = "";

    // Simula resposta do Eli
    ultimoCodigo = `function soma(a, b) {\n  return a + b;\n}\nconsole.log(soma(5, 3));`;
    addMsg(`Pronto! Código criado 👇<br><button onclick="enviarProEditor()" style="margin-top:8px; padding:6px 12px; background:#f59e0b; border:none; border-radius:4px; cursor:pointer;">REPLIT ▶️</button>`, 'eli');
}

function enviarFoto() {
    addMsg(`📷 [Foto enviada]`, 'user');
    addMsg(`Vi a foto wy! Quer que eu gere código baseado nisso?`, 'eli');
}

function addMsg(texto, tipo) {
    document.getElementById('messages').innerHTML += `<div class="msg msg-${tipo}">${texto}</div>`;
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function enviarProEditor() {
    document.getElementById('editor').value = ultimoCodigo;
    logConsole("> Código enviado para o editor");
}

function executar() {
    let codigo = document.getElementById('editor').value;
    try {
        let resultado = eval(codigo);
        logConsole("> Resultado: " + resultado);
    } catch(e) {
        logConsole("> Erro: " + e.message);
    }
}

function logConsole(texto) {
    document.getElementById('console-log').innerHTML += `<br>${texto}`;
    document.getElementById('console-log').scrollTop = document.getElementById('console-log').scrollHeight;
}
</script>
</body>
</html>
