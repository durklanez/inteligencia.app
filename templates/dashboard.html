<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0F;color:#00FF00;font-family:'Courier New',monospace;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #00FF00;padding-bottom:10px;margin-bottom:30px}
h1{font-size:24px;text-shadow:0 0 10px #00FF00}
.btn-sair{color:#FF5555;text-decoration:none;border:1px solid #FF5555;padding:8px 12px;border-radius:5px}
.btn-sair:hover{background:#FF5555;color:#0A0A0F}
.card{background:#1A1A2E;border:2px solid #333;padding:25px;border-radius:10px;cursor:pointer;transition:0.2s;max-width:400px}
.card:hover{border-color:#00FF00;box-shadow:0 0 15px #00FF00}
.card h2{margin-bottom:8px}
.card p{color:#888}
</style>
</head>
<body>
    <div class="header">
        <h1>> Menu Principal</h1>
        <a href="/" class="btn-sair">Sair</a> <!-- Vai pra index, NUNCA pra /api -->
    </div>

    <div class="card" onclick="window.location.href='/chat_ui'"> <!-- Vai pra /chat_ui, NUNCA pra /api -->
        <h2>[01] Console + IA</h2>
        <p>Chat e Executar Python</p>
    </div>
</body>
</html>
