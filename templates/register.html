<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar - RASTER</title>
<style>
body{background:#0a0a0a;color:#0f0;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{border:2px solid #0f0;padding:20px;border-radius:10px;width:300px}
h2{color:#0f0;margin:0 0 15px}
input{width:100%;padding:10px;margin:8px 0;background:#111;border:1px solid #0f0;color:#0f0;border-radius:5px;box-sizing:border-box}
button{width:100%;padding:12px;background:#0f0;border:none;color:#000;font-weight:bold;border-radius:5px;cursor:pointer;margin-top:10px}
.msg{color:red;text-align:center;margin-top:10px;height:20px}
a{color:#0f0;font-size:12px}
</style>
</head>
<body>
<div class="box">
  <h2>> Criar Conta</h2>
  <input type="email" id="email" placeholder="Email" value="durkjosue@gmail.com">
  <input type="password" id="senha" placeholder="Senha">
  <button id="btn">Registrar</button>
  <div class="msg" id="msg"></div>
  <a href="/login">Já tem conta? Entrar</a>
</div>

<script>
document.getElementById("btn").onclick = async () => {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("msg");
  
  msg.style.color = "#0f0";
  msg.textContent = "Registrando...";

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" }, // <- O FIX
      body: JSON.stringify({ email, senha, nome: "User" })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      msg.style.color = "lime";
      msg.textContent = data.msg;
      setTimeout(() => location.href = "/chat", 800);
    } else {
      msg.style.color = "red";
      msg.textContent = data.erro; // Agora vem "Email já existe" ou "Preenche..."
    }
  } catch {
    msg.style.color = "red";
    msg.textContent = "Erro de conexão";
  }
};
</script>
</body>
</html>
