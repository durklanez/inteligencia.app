<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:white;font-family:Arial,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
        .container{width:350px;text-align:center}
        h1{font-size:32px;margin-bottom:20px;color:#00FF00}
        input{width:100%;padding:15px;margin:10px 0;background:#1A1A2E;border:2px solid #333;border-radius:8px;color:white;font-size:16px}
        .btn{width:100%;padding:15px;margin:20px 0;background:#00FF00;color:#0A0A0F;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer}
        .erro{color:red;margin-bottom:10px}
        a{color:#00FF00;text-decoration:none}
    </style>
</head>
<body>
    <div class="container">
        <h1>Criar conta</h1>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="usuario" placeholder="Nome de usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button class="btn" type="submit">Criar conta</button>
        </form>
        <p>Já tem conta? <a href="/login">Entrar</a></p>
    </div>
</body>
</html>
