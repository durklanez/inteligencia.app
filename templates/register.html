<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
body{background:#0A0A0F;color:#00FF00;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh}
.box{width:90%;max-width:350px;border:1px solid #00FF00;padding:20px;border-radius:10px}
input,button{width:100%;padding:15px;margin:10px 0;background:#1A1A2E;border:1px solid #333;color:#00FF00;border-radius:8px;font-size:16px}
button{background:#00FF00;color:#0A0A0F;font-weight:bold;cursor:pointer}
#msg{color:#FF5555;text-align:center;margin-top:10px;height:20px}
a{color:#888;font-size:14px}
</style>
</head>
<body>
<div class="box">
<h2>> Criar Conta</h2>

<form id="regForm"> <!-- Form com ID pra travar -->
<input id="email" type="email" placeholder="Email" required>
<input id="pass" type="password" placeholder="Senha min 6 chars" required>
<button>Registrar</button>
</form>

<p id="msg"></p>
<a href="/login">Já tem conta? Entrar</a>
</div>

<script>
document.getElementById('regForm').addEventListener('submit', async function(e){
  e.preventDefault(); // <<<< ISSO AQUI MATA O ERRO 405. É OBRIGATÓRIO
  
  let msg = document.getElementById('msg');
  msg.style.color = '#888';
  msg.innerText = 'Criando...';
  
  let e_mail = document.getElementById('email').value;
  let p = document.getElementById('pass').value;

  try{
    let r = await fetch('/api/register',{
      method:'POST', // Força POST
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:e_mail,password:p})
    });
    let d = await r.json();
    
    if(d.status==='ok'){
      msg.style.color = '#00FF00';
      msg.innerText = 'Conta criada! Indo pro login...';
      setTimeout(()=>window.location.href='/login', 1000);
    } else {
      msg.style.color = '#FF5555';
      msg.innerText = d.msg;
    }
  }catch(err){
    msg.style.color = '#FF5555';
    msg.innerText = 'Erro de conexão';
  }
});
</script>
</body>
</html>
