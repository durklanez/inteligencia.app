<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#00FF00;font-family:'Courier New', monospace;height:100vh;display:flex;flex-direction:column}
       .header{padding:10px 15px;border-bottom:1px solid #00FF00;display:flex;justify-content:space-between;align-items:center}
        a{color:#00FF00;text-decoration:none;border:1px solid #00FF00;padding:5px 10px;border-radius:5px;font-size:12px}
        a:hover{background:#00FF00;color:#0A0A0F}
        .main{display:flex;flex:1;gap:10px;padding:10px}
       .box{background:#1A1A2E;border:1px solid #333;border-radius:8px;display:flex;flex-direction:column}
       .box-title{padding:8px;border-bottom:1px solid #333;font-size:14px;color:#888}
        textarea{flex:1;background:transparent;border:none;color:#00FF00;padding:10px;font-family:'Courier New';font-size:14px;outline:none;resize:none}
       .chat-box{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
       .msg{padding:8px;border-radius:6px;font-size:14px}
       .user{background:#00FF20;color:#0A0A0F;align-self:flex-end}
       .ia{background:#333;align-self:flex-start}
       .input-area{display:flex;border-top:1px solid #333}
        #chat-input{flex:1;background:transparent;border:none;color:white;padding:10px}
       .col-left{width:35%;display:flex;flex-direction:column;gap:10px}
       .col-right{flex:1;display:flex;flex-direction:column;gap:10px}
       .console{height:40%}
       .editor{height:60%}
       .output{height:70%}
       .btn-run{padding:15px;background:#00FF00;color:#0A0A0F;border:none;font-weight:bold;font-size:16px;cursor:pointer;border-radius:8px}
        .btn-run:hover{box-shadow:0 0 15px #00FF00}
        @media(max-width: 768px){.main{flex-direction:column}.col-left{width:100%;height:40%}}
    </style>
</head>
<body>
    <div class="header">
        <b>> Console.exe</b>
        <a href="/dashboard">Menu</a>
    </div>

    <div class="main">
        <div class="col-left">
            <div class="box chat">
                <div class="box-title">Chat IA - Groq</div>
                <div class="chat-box" id="chat-box"></div>
                <div class="input-area">
                    <input id="chat-input" placeholder="Pergunta pra IA...">
                    <button onclick="enviarChat()" style="background:#00FF00;color:#0A0A0F;border:none;padding:0 15px;cursor:pointer;">></button>
                </div>
            </div>
        </div>

        <div class="col-right">
            <div class="box editor">
                <div class="box-title">editor.py</div>
                <textarea id="code" placeholder="print('Ola mundo')"></textarea>
            </div>
            <button class="btn-run" onclick="runCode()">RUN ▶</button>
            <div class="box console">
                <div class="box-title">Output / Terminal</div>
                <div class="chat-box" id="output-box">$ Aguardando execução...</div>
            </div>
        </div>
    </div>

    <script>
        // CHAT COM A IA
        async function enviarChat(){
            let txt = document.getElementById('chat-input');
            if(!txt.value) return;
            let chat = document.getElementById('chat-box');
            chat.innerHTML += `<div class="msg user">${txt.value}</div>`;
            let userMsg = txt.value;
            txt.value = '';
            chat.scrollTop = chat.scrollHeight;

            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: userMsg})
            });
            let data = await res.json();
            chat.innerHTML += `<div class="msg ia">${data.resposta}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
        document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key === 'Enter') enviarChat() });

        // BOTÃO RUN - EXECUTAR CÓDIGO
        async function runCode(){
            let code = document.getElementById('code').value;
            let out = document.getElementById('output-box');
            out.innerHTML = '$ Executando...';
            let res = await fetch('/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: code})
            });
            let data = await res.json();
            out.innerHTML = data.output || data.error;
        }
    </script>
</body>
  </html>
