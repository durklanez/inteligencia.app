<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{background:#0A0A0F;color:#00FF00;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh}
.box{width:90%;max-width:350px;border:1px solid #00FF00;padding:20px;border-radius:10px}
input,button{width:100%;padding:15px;margin:10px 0;background:#1A1A2E;border:1px solid #333;color:#00FF00;border-radius:8px;font-size:16px}
button{background:#00FF00;color:#0A0A0F;font-weight:bold;cursor:pointer}
button:hover{box-shadow:0 0 15px #00FF00}
#msg{color:#FF5555;text-align:center;margin-top:10px;height:20px}
</style>
</head>
<body>
<div class="box">
<h2>> Login</h2>

<form id="loginForm"> <!-- Agora é form, mas vamos travar ele -->
<input id="email" type="email" placeholder="Email" required>
<input id="pass" type="password" placeholder="Senha" required>
<button>Entrar</button>
<p id="msg"></p>
</form>

<a href="/register" style="color:#888">Criar conta</a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault(); // << ISSO AQUI TRAVA O GET. É A SOLUÇÃO
  let msg = document.getElementById('msg');
  msg.innerText = 'Entrando...';

  let e_mail = document.getElementById('email').value;
  let p = document.getElementById('pass').value;
  
  let r = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:e_mail,password:p})
  });
  let d = await r.json();
  
  if(d.status==='ok'){
    window.location.href = '/dashboard'; // VAI PRA PÁGINA DE TRABALHO
  } else {
    msg.innerText = d.msg || 'Email ou senha inválidos';
  }
});
</script>
</body>
</html>
