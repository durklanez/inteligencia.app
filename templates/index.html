<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container {
  padding:10px;
}

.hidden { display:none; }

.box {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.chat {
  height:250px;
  overflow:auto;
  background:#020617;
  padding:10px;
}

.row {
  display:flex;
  gap:5px;
}

input, textarea, button {
  padding:10px;
  margin-top:5px;
}

textarea {
  width:100%;
  height:150px;
}

.run { background:#22c55e; }
.send { background:#3b82f6; width:60px; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password">
  <button onclick="login()">Entrar</button>
</div>

<!-- EDITOR -->
<div id="editor" class="hidden">

  <!-- CONSOLE -->
  <div class="box">
    <h3>Console</h3>
    <div id="console">Pronto...</div>
  </div>

  <!-- IA -->
  <div class="box">
    <h3>IA</h3>

    <div id="chatArea" class="chat"></div>

    <div class="row">
      <input id="iaInput" placeholder="Pede código ou ajuda...">
      <button class="send" onclick="enviarMensagem()">➤</button>
    </div>
  </div>

  <!-- CÓDIGO -->
  <div class="box">
    <h3>Código</h3>
    <textarea id="codigo"></textarea>
    <button class="run" onclick="executar()">▶ Run</button>
  </div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
