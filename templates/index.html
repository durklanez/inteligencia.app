<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cafunfo App</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- BOTÃO MENU -->
<button id="menuBtn" onclick="abrirMenu()">
☰
</button>

<!-- MENU -->
<div id="sidebar" class="sidebar hidden">

<h2>⚙ Sistema</h2>

<button onclick="abrirLinguagens()">
➕ Linguagens
</button>

<button onclick="abrirApis()">
🔑 APIs
</button>

<button onclick="abrirBanco()">
🗄 Banco de Dados
</button>

<button onclick="abrirProjetos()">
📁 Projetos
</button>

<button onclick="abrirIA()">
🤖 IA
</button>

<button onclick="abrirTerminal()">
🛠 Terminal
</button>

<button onclick="abrirConfig()">
⚡ Configurações
</button>

</div>

<div class="container">

<!-- HOME -->
<div id="home">

<h1>🔥 Cafunfo App</h1>

<button onclick="mostrar('login')">
Entrar
</button>

<button onclick="mostrar('register')">
Criar Conta
</button>

</div>

<!-- LOGIN -->
<div id="login" class="hidden">

<h2>Login</h2>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<button onclick="mostrar('home')">
Voltar
</button>

</div>

<!-- REGISTER -->
<div id="register" class="hidden">

<h2>Criar Conta</h2>

<input id="new_user" placeholder="Usuário">

<input id="new_pass" type="password" placeholder="Senha">

<button onclick="registrar()">
Criar Conta
</button>

<button onclick="mostrar('home')">
Voltar
</button>

</div>

<!-- EDITOR -->
<div id="editor" class="hidden">

<h2>🚀 Bem-vindo</h2>

<div class="box">

<h3>💻 Console</h3>

<div id="console">
Pronto...
</div>

</div>

<div class="box">

<h3>🤖 IA</h3>

<div id="chatArea" class="chat"></div>

<div class="row">

<input id="iaInput" placeholder="Fala com a IA...">

<button class="send" onclick="enviarMensagem()">
➤
</button>

</div>

</div>

<div class="box">

<h3>📄 Código</h3>

<textarea id="codigo"></textarea>

<button class="run" onclick="executar()">
▶ Run
</button>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
