<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA App</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
}

.container {
  padding: 15px;
}

.hidden {
  display: none;
}

.box {
  background: #1e293b;
  padding: 10px;
  margin-top: 15px;
  border-radius: 10px;
}

.chat {
  height: 200px;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
}

input, textarea, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}

.run {
  background: #22c55e;
}
</style>
</head>

<body>

<div class="container">

<div id="home">
  <button onclick="mostrar('login')">Entrar</button>
</div>

<div id="login" class="hidden">
  <input id="user">
  <input id="pass" type="password">
  <button onclick="login()">Login</button>
</div>

<div id="editor" class="hidden">

  <!-- CONSOLE -->
  <div class="box">
    <h3>Console</h3>
    <div id="console">Pronto...</div>
  </div>

  <!-- IA -->
  <div class="box">
    <h3>IA</h3>

    <div id="chatArea" class="chat"></div>

    <div style="display:flex;">
      <input id="iaInput">
      <button onclick="enviarMensagem()">➤</button>
    </div>
  </div>

  <!-- CÓDIGO -->
  <div class="box">
    <h3>Código</h3>
    <textarea id="codigo"></textarea>
    <button class="run" onclick="executar()">Run</button>
  </div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
