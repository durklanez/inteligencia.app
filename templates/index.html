<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0A0A0F;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 50px;
            color: #00FF00;
        }
        .btn {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 15px auto;
            background: #1A1A2E;
            color: white;
            text-decoration: none;
            border: 2px solid #00FF00;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #00FF00;
            color: #0A0A0F;
        }
        .ou {
            margin: 20px 0;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bem vindo a Intelligence App</h1>
        
        <a href="/register" class="btn">Criar conta</a>
        <div class="ou">Ou</div>
        <a href="/login" class="btn">Entrar</a>
    </div>
</body>
  </html>
