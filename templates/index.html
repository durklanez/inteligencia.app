<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cafunfo App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

input, textarea, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<div id="home">
  <h2>🔥 Cafunfo App</h2>
  <button onclick="mostrar('register')">Criar Conta</button>
  <button onclick="mostrar('login')">Entrar</button>
</div>

<div id="login" class="hidden">
  <h2>Login</h2>
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="register" class="hidden">
  <h2>Registrar</h2>
  <input id="new_user" placeholder="Usuário">
  <input id="new_pass" type="password" placeholder="Senha">
  <button onclick="registrar()">Criar Conta</button>
</div>

<div id="menu" class="hidden">
  <h2>Menu</h2>
  <button onclick="mostrar('ia')">Gerar App IA</button>
</div>

<div id="ia" class="hidden">
  <h2>IA 🤖</h2>
  <textarea id="prompt"></textarea>
  <button onclick="gerar()">Gerar</button>
  <pre id="resultado"></pre>
</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
