<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Editor Python</title>

<style>
body {
    background: #0f172a;
    font-family: Arial;
    color: white;
    margin: 0;
    padding: 0;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding: 15px;
}

/* CAIXAS */
.box {
    background: #1e293b;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.box h2 {
    margin-bottom: 10px;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 120px;
    border-radius: 8px;
    border: none;
    padding: 10px;
    background: #0f172a;
    color: #00ffcc;
    resize: none;
}

/* CONSOLE */
#console {
    background: black;
    color: #00ff00;
    height: 150px;
    overflow-y: auto;
    padding: 10px;
    border-radius: 8px;
}

/* BOTÕES */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<div class="container">

    <!-- 1️⃣ CONSOLE -->
    <div class="box">
        <h2>💻 Console</h2>
        <div id="console">Pronto...</div>
    </div>

    <!-- 2️⃣ IA -->
    <div class="box">
        <h2>🤖 IA</h2>
        <textarea id="pergunta" placeholder="Pergunta sobre o código..."></textarea>
        <button onclick="perguntarIA()">Perguntar IA</button>
    </div>

    <!-- 3️⃣ CÓDIGO -->
    <div class="box">
        <h2>📝 Código</h2>
        <textarea id="codigo" placeholder="Escreve código aqui..."></textarea>
        <button onclick="executar()">▶ Run</button>
    </div>

</div>

<script>
function executar() {
    let codigo = document.getElementById("codigo").value;
    let consoleBox = document.getElementById("console");

    consoleBox.innerHTML = "Executando...\n";

    fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code: codigo })
    })
    .then(res => res.json())
    .then(data => {
        consoleBox.innerHTML += data.output;
    })
    .catch(err => {
        consoleBox.innerHTML += "\nErro: " + err;
    });
}

function perguntarIA() {
    let pergunta = document.getElementById("pergunta").value;
    let consoleBox = document.getElementById("console");

    fetch("/ia", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pergunta: pergunta })
    })
    .then(res => res.json())
    .then(data => {
        consoleBox.innerHTML += "\n\n" + data.resposta;
    })
    .catch(err => {
        consoleBox.innerHTML += "\nErro IA: " + err;
    });
}
</script>

</body>
</html>
