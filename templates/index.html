<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intelligence App</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- MENU (SÓ LOGADO) -->
<div id="sidebar" class="sidebar hidden">

  <h2>⚙ Menu</h2>

  <button onclick="mostrarCriarApp()">🚀 Começar a criar app</button>
  <button onclick="mostrarChat()">🤖 IA</button>
  <button onclick="logout()">🚪 Sair</button>

</div>

<!-- HOME -->
<div id="home">

  <h1>🔥 Intelligence App</h1>

  <button onclick="mostrar('login')">Entrar</button>

</div>

<!-- LOGIN -->
<div id="login" class="hidden">

  <h2>Login</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

</div>

<!-- MENU PRINCIPAL -->
<div id="menu" class="hidden">

  <h2>🏠 Página Principal</h2>

  <button onclick="mostrarCriarApp()">🚀 Começar a criar app</button>

</div>

<!-- ESCOLHER LINGUAGEM -->
<div id="linguagens" class="hidden">

  <h2>📂 Escolhe linguagem</h2>

  <button onclick="abrirEditor('Python')">🐍 Python</button>
  <button onclick="abrirEditor('JavaScript')">🟨 JavaScript</button>
  <button onclick="abrirEditor('HTML')">🌐 HTML</button>

  <button onclick="voltarMenu()">← Voltar</button>

</div>

<!-- EDITOR -->
<div id="editor" class="hidden">

  <h2 id="langTitle">Editor</h2>

  <textarea id="codigo"></textarea>

  <button onclick="executar()">▶ Run</button>
  <button onclick="salvarCodigo()">💾 Guardar</button>
  <button onclick="voltarLinguagens()">← Voltar</button>

  <div id="console">Console...</div>

</div>

<!-- IA CHAT -->
<div id="chat" class="hidden">

  <h2>🤖 IA</h2>

  <div id="chatBox"></div>

  <input id="msg" placeholder="Fala com a IA">
  <button onclick="enviarMsg()">Enviar</button>

  <button onclick="voltarMenu()">← Voltar</button>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
