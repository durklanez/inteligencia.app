<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafunfo App</title>

<style>

/* FUNDO */
body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
padding:0;
overflow-x:hidden;
}

/* BOTÃO MENU */
#menuBtn{
position:fixed;
top:15px;
left:15px;
width:60px;
height:60px;
background:#2563eb;
color:white;
border:none;
border-radius:15px;
font-size:32px;
font-weight:bold;
z-index:999999;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 15px rgba(0,0,0,0.5);
cursor:pointer;
}

/* MENU */
.sidebar{
position:fixed;
top:0;
left:0;
width:270px;
height:100%;
background:#111827;
padding:20px;
overflow-y:auto;
z-index:99999;
box-shadow:5px 0 15px rgba(0,0,0,0.5);
}

/* TITULO MENU */
.sidebar h2{
margin-top:70px;
margin-bottom:20px;
}

/* BOTÕES MENU */
.sidebar button{
width:100%;
padding:14px;
margin-top:12px;
background:#1e293b;
color:white;
border:none;
border-radius:12px;
text-align:left;
font-size:16px;
}

/* ESCONDER */
.hidden{
display:none;
}

/* CONTAINER */
.container{
padding:90px 15px 15px 15px;
}

/* INPUTS */
button,input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
box-sizing:border-box;
}

/* BOX */
.box{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:12px;
}

/* CHAT */
.chat{
height:300px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* TEXTAREA */
textarea{
height:180px;
background:black;
color:white;
font-size:16px;
}

/* CONSOLE */
#console{
background:black;
color:#22c55e;
padding:10px;
height:120px;
overflow:auto;
border-radius:10px;
}

/* LINHA */
.row{
display:flex;
gap:5px;
}

/* BOTÃO ENVIAR */
.send{
width:70px;
background:#2563eb;
color:white;
font-size:22px;
}

/* BOTÃO RUN */
.run{
background:#22c55e;
color:white;
font-size:18px;
}

/* MENSAGENS */
.msg-user{
text-align:right;
margin:10px;
background:#2563eb;
padding:10px;
border-radius:10px;
}

.msg-bot{
text-align:left;
margin:10px;
background:#1e293b;
padding:10px;
border-radius:10px;
color:#22c55e;
}

</style>
</head>

<body>

<!-- BOTÃO MENU -->
<button id="menuBtn" onclick="abrirMenu()">
☰
</button>

<!-- MENU -->
<div id="sidebar" class="sidebar hidden">

<h2>⚙ Sistema</h2>

<button>➕ Linguagens</button>
<button>🔑 APIs</button>
<button>🗄 Banco de Dados</button>
<button>📁 Projetos</button>
<button>🤖 IA</button>
<button>🛠 Terminal</button>
<button>⚡ Configurações</button>

</div>

<div class="container">

<!-- HOME -->
<div id="home">

<h2>🔥 Cafunfo App</h2>

<button onclick="mostrar('login')">
Entrar
</button>

<button onclick="mostrar('register')">
Criar Conta
</button>

</div>

<!-- LOGIN -->
<div id="login" class="hidden">

<h2>Login</h2>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<button onclick="mostrar('home')">
Voltar
</button>

</div>

<!-- REGISTER -->
<div id="register" class="hidden">

<h2>Criar Conta</h2>

<input id="new_user" placeholder="Usuário">

<input id="new_pass" type="password" placeholder="Senha">

<button onclick="registrar()">
Criar Conta
</button>

<button onclick="mostrar('home')">
Voltar
</button>

</div>

<!-- EDITOR -->
<div id="editor" class="hidden">

<h2>🚀 Bem-vindo</h2>

<!-- CONSOLE -->
<div class="box">

<h3>💻 Console</h3>

<div id="console">
Pronto...
</div>

</div>

<!-- IA -->
<div class="box">

<h3>🤖 IA</h3>

<div id="chatArea" class="chat"></div>

<div class="row">

<input id="iaInput" placeholder="Fala com a IA...">

<button class="send" onclick="enviarMensagem()">
➤
</button>

</div>

</div>

<!-- CÓDIGO -->
<div class="box">

<h3>📄 Código</h3>

<textarea id="codigo"></textarea>

<button class="run" onclick="executar()">
▶ Run
</button>

</div>

</div>

</div>

<script>

// MENU
function abrirMenu(){

document.getElementById("sidebar")
.classList.toggle("hidden");

}

// TROCAR TELAS
function mostrar(id){

document.querySelectorAll(
"#home,#login,#register,#editor"
).forEach(div => {

div.classList.add("hidden");

});

document.getElementById(id)
.classList.remove("hidden");

}

// INICIO
window.onload = function(){

mostrar("home");

}

// LOGIN
async function login(){

const username =
document.getElementById("user").value;

const password =
document.getElementById("pass").value;

const res = await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,password
})

});

const data = await res.json();

alert(data.msg);

if(data.msg === "Login OK"){

mostrar("editor");

}

}

// REGISTER
async function registrar(){

const username =
document.getElementById("new_user").value;

const password =
document.getElementById("new_pass").value;

const res = await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,password
})

});

const data = await res.json();

alert(data.msg);

// LOGIN AUTOMÁTICO
if(data.msg.includes("sucesso")){

const loginRes = await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,password
})

});

const loginData =
await loginRes.json();

if(loginData.msg === "Login OK"){

mostrar("editor");

}

}

}

// IA
async function enviarMensagem(){

const texto =
document.getElementById("iaInput").value;

if(!texto) return;

const chat =
document.getElementById("chatArea");

chat.innerHTML += `
<div class="msg-user">
${texto}
</div>
`;

document.getElementById("iaInput").value = "";

const res = await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
mensagem:texto
})

});

const data = await res.json();

chat.innerHTML += `
<div class="msg-bot">
${data.resposta}
</div>
`;

chat.scrollTop = chat.scrollHeight;

}

// RUN
function executar(){

try{

let codigo =
document.getElementById("codigo").value;

let result = eval(codigo);

document.getElementById("console")
.innerHTML = result || "Executado";

}catch(e){

document.getElementById("console")
.innerHTML = e;

}

}

</script>

</body>
</html>
