<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cafunfo App</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<!-- BOTAO MENU -->
<button id="menuBtn" onclick="abrirMenu()">
☰
</button>

<!-- MENU -->
<div id="sidebar" class="sidebar hidden">

<h2>⚙ Sistema</h2>

<button onclick="abrirPagina('linguagens')">
➕ Linguagens
</button>

<button onclick="abrirPagina('apis')">
🔑 APIs
</button>

<button onclick="abrirPagina('db')">
🗄 Banco de Dados
</button>

<button onclick="abrirPagina('projetos')">
📁 Projetos
</button>

<button onclick="abrirPagina('terminal')">
🛠 Terminal
</button>

<button onclick="abrirPagina('config')">
⚡ Configurações
</button>

</div>

<div class="container">

<!-- HOME -->
<div id="home">

<h1>🔥 Cafunfo App</h1>

<button onclick="mostrar('login')">
Entrar
</button>

<button onclick="mostrar('register')">
Criar Conta
</button>

</div>

<!-- LOGIN -->
<div id="login" class="hidden">

<h2>Login</h2>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<button onclick="mostrar('home')">
Voltar
</button>

</div>

<!-- REGISTER -->
<div id="register" class="hidden">

<h2>Criar Conta</h2>

<input id="new_user" placeholder="Usuário">

<input id="new_pass" type="password" placeholder="Senha">

<button onclick="registrar()">
Criar Conta
</button>

<button onclick="mostrar('home')">
Voltar
</button>

</div>

<!-- EDITOR -->
<div id="editor" class="hidden">

<h2>🚀 Bem-vindo</h2>

<!-- LINGUAGENS -->
<div id="linguagens" class="hidden box">

<h3>➕ Linguagens</h3>

<button onclick="addCodigo('python')">
Python
</button>

<button onclick="addCodigo('javascript')">
JavaScript
</button>

<button onclick="addCodigo('html')">
HTML
</button>

<button onclick="addCodigo('css')">
CSS
</button>

</div>

<!-- API -->
<div id="apis" class="hidden box">

<h3>🔑 APIs</h3>

<button onclick="testarAPI()">
Testar API
</button>

</div>

<!-- DB -->
<div id="db" class="hidden box">

<h3>🗄 Banco</h3>

<button onclick="verDB()">
Ver Banco
</button>

</div>

<!-- PROJETOS -->
<div id="projetos" class="hidden box">

<h3>📁 Projetos</h3>

<button onclick="novoProjeto()">
Novo Projeto
</button>

</div>

<!-- TERMINAL -->
<div id="terminal" class="hidden box">

<h3>🛠 Terminal</h3>

<div id="terminalBox">
Terminal pronto...
</div>

<button onclick="limparTerminal()">
Limpar
</button>

</div>

<!-- CONFIG -->
<div id="config" class="hidden box">

<h3>⚡ Config</h3>

<button onclick="temaDark()">
Tema Dark
</button>

</div>

<!-- CONSOLE -->
<div class="box">

<h3>💻 Console</h3>

<div id="console">
Pronto...
</div>

</div>

<!-- IA -->
<div class="box">

<h3>🤖 IA</h3>

<div id="chatArea" class="chat"></div>

<div class="row">

<input id="iaInput" placeholder="Fala com IA">

<button class="send" onclick="enviarMensagem()">
➤
</button>

</div>

</div>

<!-- CODIGO -->
<div class="box">

<h3>📄 Código</h3>

<textarea id="codigo"></textarea>

<button class="run" onclick="executar()">
▶ Run
</button>

</div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
