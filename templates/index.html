<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafunfo App</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { padding:15px; }
.hidden { display:none; }

.box {
  background:#1e293b;
  padding:10px;
  margin-top:15px;
  border-radius:10px;
}

.chat {
  height:200px;
  overflow:auto;
  background:#020617;
  padding:10px;
}

.row {
  display:flex;
  gap:5px;
}

input, textarea, button {
  width:100%;
  padding:10px;
  margin-top:10px;
}

textarea { height:120px; }

.send { width:60px; background:#3b82f6; }
.run { background:#22c55e; }
</style>
</head>

<body>

<div class="container">

<!-- HOME -->
<div id="home">
  <h2>🔥 Cafunfo App</h2>
  <button onclick="mostrar('login')">Entrar</button>
  <button onclick="mostrar('register')">Criar Conta</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password">
  <button onclick="login()">Entrar</button>
  <button onclick="mostrar('home')">Voltar</button>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
  <input id="new_user" placeholder="Usuário">
  <input id="new_pass" type="password">
  <button onclick="registrar()">Criar Conta</button>
  <button onclick="mostrar('home')">Voltar</button>
</div>

<!-- EDITOR COMPLETO -->
<div id="editor" class="hidden">

  <h2>🚀 Bem-vindo ao teu sistema</h2>

  <!-- CONSOLE -->
  <div class="box">
    <h3>💻 Console</h3>
    <div id="console">Pronto...</div>
  </div>

  <!-- IA -->
  <div class="box">
    <h3>🤖 IA</h3>

    <div id="chatArea" class="chat"></div>

    <div class="row">
      <input id="iaInput" placeholder="Fala com a IA...">
      <button class="send" onclick="enviarMensagem()">➤</button>
    </div>
  </div>

  <!-- CÓDIGO -->
  <div class="box">
    <h3>📄 Código</h3>
    <textarea id="codigo"></textarea>
    <button class="run" onclick="executar()">▶ Run</button>
  </div>

</div>

</div>

<script>
function mostrar(id) {
  document.querySelectorAll("#home, #login, #register, #editor")
    .forEach(div => div.classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");
}

window.onload = () => mostrar("home");

// LOGIN
async function login() {
  const username = user.value;
  const password = pass.value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  const data = await res.json();
  alert(data.msg);

  if (data.msg === "Login OK") {
    mostrar("editor");
  }
}

// REGISTRAR
async function registrar() {
  const username = new_user.value;
  const password = new_pass.value;

  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  const data = await res.json();
  alert(data.msg);
}

// IA
async function enviarMensagem() {
  const texto = iaInput.value;
  if (!texto) return;

  chatArea.innerHTML += `<div style="text-align:right">${texto}</div>`;
  iaInput.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({mensagem: texto})
  });

  const data = await res.json();

  chatArea.innerHTML += `<div style="color:#22c55e">${data.resposta}</div>`;

  // jogar código no editor
  const match = data.resposta.match(/```([\s\S]*?)```/);
  if (match) {
    codigo.value = match[1];
  }

  chatArea.scrollTop = chatArea.scrollHeight;
}

// EXECUTAR
function executar() {
  try {
    let result = eval(codigo.value);
    document.getElementById("console").textContent = result || "Executado";
  } catch (e) {
    document.getElementById("console").textContent = e;
  }
}
</script>

</body>
</html>
