<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Eli - AI Code Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
        
        body { display: flex; height: 100vh; background: #1e1e1e; color: #d4d4d4; overflow: hidden; }

        /* TELA ESQUERDA: CHAT */
        .chat {
            width: 40%;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px;
            background: #2d2d2d;
            border-bottom: 1px solid #333;
            font-weight: bold;
            color: #00ff88;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        .msg {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .msg.user { background: #007acc; }
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
        }
        .chat-input button {
            margin-left: 10px;
            padding: 10px 20px;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        /* TELA DIREITA: EDITOR + CONSOLE */
        .code-area {
            width: 60%;
            display: flex;
            flex-direction: column;
        }
        .editor {
            flex: 2;
            background: #1e1e1e;
            padding: 15px;
        }
        .editor textarea {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            border: none;
            color: #d4d4d4;
            font-size: 14px;
            outline: none;
            resize: none;
        }
        .console {
            flex: 1;
            background: #000;
            border-top: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
            color: #00ff88;
            font-size: 13px;
        }
        .console-header {
            color: #ccc;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- TELA ESQUERDA: CHAT DO ELI -->
    <div class="chat">
        <div class="chat-header">ELI AI 🤖</div>
        <div class="chat-messages" id="chatBox">
            <div class="msg">Olá wy! Sou o Eli. Me pede pra escrever código que eu mando pro editor da direita 👉</div>
        </div>
        <div class="chat-input">
            <input type="text" id="pergunta" placeholder="Digite aqui...">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <!-- TELA DIREITA: EDITOR + CONSOLE -->
    <div class="code-area">
        <div class="editor">
            <textarea id="editorCodigo">// Código vai aparecer aqui
function hello() {
    console.log("Olá do Eli!");
}</textarea>
        </div>
        <div class="console">
            <div class="console-header">CONSOLE</div>
            <div id="consoleLog">> Pronto pra executar...</div>
        </div>
    </div>

    <script>
        const url = 'https://inteligencia-apps.onrender.com/teste-firestore';

        function enviar() {
            const input = document.getElementById('pergunta');
            const texto = input.value;
            if(texto == '') return;

            // Adiciona msg do user no chat
            addMsg(texto, 'user');
            input.value = '';

            // Simula resposta do Eli
            setTimeout(() => {
                addMsg("Pronto! Coloquei o código no editor da direita 👉", 'eli');
                document.getElementById('editorCodigo').value = `// ${texto}\nconsole.log("${texto}");`;
                addConsole(`> Código atualizado pelo Eli`);
            }, 500);

            // Salva no backend também
            fetch(url, {
                method: 'POST',
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({pergunta: texto})
            });
        }

        function addMsg(texto, quem) {
            const div = document.createElement('div');
            div.className = 'msg ' + quem;
            div.innerText = texto;
            document.getElementById('chatBox').appendChild(div);
        }
        
        function addConsole(texto) {
            document.getElementById('consoleLog').innerHTML += '<br>' + texto;
        }

        // Enter pra enviar
        document.getElementById('pergunta').addEventListener('keypress', e => {
            if(e.key == 'Enter') enviar();
        });
    </script>
</body>
</html>
